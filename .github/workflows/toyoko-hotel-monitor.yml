name: Toyoko Hotel Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Run checker
        id: checker
        run: |
          OUT=$(python hotel_check_toyoko.py)
          echo "$OUT"
          echo "json=$OUT" >> $GITHUB_OUTPUT

      - name: Parse result
        id: parse
        env:
          RAW: ${{ steps.checker.outputs.json }}
        run: |
          python - << 'PY'
          import json, os

          data = json.loads(os.environ["RAW"])
          ok = bool(data.get("ok", False))
          found = bool(data.get("found", False))
          count = data.get("count", 0)
          url = data.get("url", "")
          checked_at = data.get("checked_at", "")
          note = data.get("note", "")

          def out(k, v):
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
                  f.write(f"{k}={v}\n")

          out("ok", "true" if ok else "false")
          out("found", "true" if found else "false")
          out("count", str(count))
          out("url", url)
          out("checked_at", checked_at)
          out("note", note.replace("\n", " "))
          PY

      - name: Create issue if room available (only once)
        if: ${{ steps.parse.outputs.ok == 'true' && steps.parse.outputs.found == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Toyoko 호텔 공실 발견";

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            const exist = issues.find(i => i.title === title);
            if (exist) return;

            const checkedAt = "${{ steps.parse.outputs.checked_at }}";
            const url = "${{ steps.parse.outputs.url }}";
            const count = "${{ steps.parse.outputs.count }}";

            const body =
              "Toyoko 예약 페이지에서 '객실 선택' 버튼이 감지되었다.\n\n" +
              "- 확인시각: " + checkedAt + "\n" +
              "- 매칭 개수: " + count + "\n" +
              "- 링크: " + url + "\n";

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });

      - name: Close issue when sold out (reset)
        if: ${{ steps.parse.outputs.ok == 'true' && steps.parse.outputs.found == 'false' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Toyoko 호텔 공실 발견";

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            const exist = issues.find(i => i.title === title);
            if (!exist) return;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: exist.number,
              state: "closed"
            });

      - name: Fail if real error occurs
        if: ${{ steps.parse.outputs.ok == 'false' }}
        run: |
          echo "Checker failed: ${{ steps.parse.outputs.note }}"
          exit 1
