name: Toyoko hotel monitor (room selectable)

on:
  schedule:
    - cron: "0 * * * *" # 매시간 00분(UTC 기준)
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (Playwright + Chromium)
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Run checker
        id: mon
        run: |
          OUT=$(python hotel_check_toyoko.py)
          echo "$OUT"
          echo "json=$OUT" >> $GITHUB_OUTPUT

      - name: Parse result
        id: parse
        run: |
          python - << 'PY'
          import json, os
          data = json.loads(os.environ["RAW"])

          ok = bool(data.get("ok", False))
          found = bool(data.get("found", False))
          match_count = data.get("match_count", 0)
          url = data.get("url", "")
          checked_at = data.get("checked_at", "")
          note = data.get("note", "")

          def out(k,v):
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
                  f.write(f"{k}={v}\n")

          out("ok", "true" if ok else "false")
          out("found", "true" if found else "false")
          out("match_count", str(match_count))
          out("url", url)
          out("checked_at", checked_at)
          out("note", note.replace("\n"," "))
          PY
        env:
          RAW: ${{ steps.mon.outputs.json }}

      # (A) found=true일 때: 이미 알림(이슈)이 열려있으면 이메일 중복 발송 방지
      - name: Check existing alert issue
        if: ${{ steps.parse.outputs.ok == 'true' && steps.parse.outputs.found == 'true' }}
        id: issuecheck
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Toyoko 객실 선택 버튼 감지";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find(i => i.title === title);
            core.setOutput("exists", existing ? "true" : "false");
            core.setOutput("number", existing ? String(existing.number) : "");

      # (B) 이슈가 없으면: 이메일 발송 + 이슈 생성(상태 저장)
      - name: Send email (first time only)
        if: ${{ steps.parse.outputs.ok == 'true' && steps.parse.outputs.found == 'true' && steps.issuecheck.outputs.exists != 'true' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          URL: ${{ steps.parse.outputs.url }}
          CHECKED_AT: ${{ steps.parse.outputs.checked_at }}
          MATCH_COUNT: ${{ steps.parse.outputs.match_count }}
        run: |
          python - << 'PY'
          import os, smtplib
          from email.mime.text import MIMEText

          host = os.environ["SMTP_HOST"]
          port = int(os.environ.get("SMTP_PORT","587"))
          user = os.environ["SMTP_USER"]
          pw   = os.environ["SMTP_PASS"]
          to_  = os.environ["MAIL_TO"]
          from_= os.environ.get("MAIL_FROM") or user

          url = os.environ["URL"]
          checked_at = os.environ["CHECKED_AT"]
          match_count = os.environ["MATCH_COUNT"]

          subject = "[호텔 알림] '객실 선택' 버튼 감지"
          body = f"""토요코인 예약 페이지에서 '객실 선택' 버튼이 감지되었다.

- 감지시각: {checked_at}
- 매칭 개수: {match_count}
- 링크: {url}
"""

          msg = MIMEText(body, _charset="utf-8")
          msg["Subject"] = subject
          msg["From"] = from_
          msg["To"] = to_

          with smtplib.SMTP(host, port, timeout=30) as s:
            s.ehlo()
            try:
              s.starttls()
              s.ehlo()
            except Exception:
              pass
            s.login(user, pw)
            s.sendmail(from_, [to_], msg.as_string())
          print("Email sent.")
          PY

      - name: Create alert issue (state)
        if: ${{ steps.parse.outputs.ok == 'true' && steps.parse.outputs.found == 'true' && steps.issuecheck.outputs.exists != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Toyoko 객실 선택 버튼 감지";
            const url = "${{ steps.parse.outputs.url }}";
            const checkedAt = "${{ steps.parse.outputs.checked_at }}";
            const matchCount = "${{ steps.parse.outputs.match_count }}";
            const note = "${{ steps.parse.outputs.note }}";

            const body = [
              `'객실 선택' 버튼이 감지되었다.`,
              `감지시각: ${checkedAt}`,
              `매칭 개수: ${matchCount}`,
              `링크: ${url}`,
              `비고: ${note}`
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });

      # (C) found=false이면: 열려있는 알림 이슈를 닫아 다음에 다시 감지되면 재알림 가능하게 함
      - name: Close alert issue when not found
        if: ${{ steps.parse.outputs.ok == 'true' && steps.parse.outputs.found == 'false' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Toyoko 객실 선택 버튼 감지";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: "closed"
              });
            }

      # (D) 진짜 오류(ok=false)면 워크플로우 실패 처리(차단/접속오류 추적용)
      - name: Fail loudly if real error occurs
        if: ${{ steps.parse.outputs.ok == 'false' }}
        run: |
          echo "Checker failed: ${{ steps.parse.outputs.note }}"
          exit 1
